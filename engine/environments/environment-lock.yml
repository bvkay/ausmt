# EXACT lock of the tested mt_metadata/mth5 environment (win-64), captured 2026-06-16 from the
# known-good `ausmt` env via `conda env export`. This is the reproducibility anchor for the Phase-1
# canonical-ingest path (ausmt_science.ingest.normalize). Reproduce on win-64 with:
#   conda env create -f environments/environment-lock.yml
# Cross-platform / CI (Linux, all-pip) uses environments/requirements-mtmetadata-lock.txt instead.
#
# NOTE on ABI: this env is a HYBRID — conda-forge python + numpy (MKL-linked), pip everything else
# (scipy/pandas/xarray/h5py/mt_metadata/mth5, OpenBLAS). It WORKS (the normalize round-trip passes).
# See environments/README.md for the ABI history (the old "all-pip only" advice is superseded).
