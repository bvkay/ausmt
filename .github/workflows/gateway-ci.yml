name: gateway-ci

# The gateway (submission intake + antivirus + curator publish flow) is a first-class subsystem
# that took real community submissions this week, yet before C35a NO workflow ran its 179-test
# suite and ruff excluded it entirely (code-health review F1). This job closes that hole: it runs
# the gateway unit suite and lints gateway/ on every gateway-touching push/PR, so a gateway source
# change is TESTED before it can ship inside an unrelated deploy-triggered image rebuild.
#
# The command below is byte-identical to the one proven green locally under the ausmt env
# (179 passed, ~10s, 0 skips) — the suite drives async bodies via asyncio.run(), so no
# pytest-asyncio plugin is needed (see gateway/requirements-dev.txt).
#
# PATH-SCOPED (ADR-001 monorepo): runs when the gateway/ OR deploy/ subtree (or this workflow)
# changes. deploy/ is here because the deploy unit tests (deploy/tests) were wired into this lane's
# pytest invocation in PR #19 — but the trigger paths never followed, so a deploy-only change could
# merge without its own tests ever running in CI (caught 2026-07-10: the backup-hardening branch
# touched only deploy/** and would have merged hollow-green).

on:
  workflow_dispatch:
  push:
    paths:
      - "gateway/**"
      - "deploy/**"
      - ".github/workflows/gateway-ci.yml"
  pull_request:
    paths:
      - "gateway/**"
      - "deploy/**"
      - ".github/workflows/gateway-ci.yml"

concurrency:
  group: gateway-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # matches the gateway image + the tested ausmt env

      - name: Install gateway test deps
        run: pip install -r gateway/requirements-dev.txt

      # Install Caddy so the deploy/ access-log masking pins RUN here instead of skipping (C43 S2b-ii,
      # C45 privacy). The masked-log runtime pin (test_caddy_log_masking.py) is the executable proof
      # that the public privacy promise — "a full IP address is never stored" — is TRUE: it drives a
      # real request with X-Forwarded-For through running Caddy and asserts the full IP appears NOWHERE
      # in the log line, only the /24-masked form. A config-syntax assertion is NOT sufficient for a
      # public commitment. Without caddy on PATH these pins skip, and the skip tripwire (below) FAILS
      # loudly rather than let the privacy proof silently no-op — so this step is load-bearing, not
      # optional. Pinned version for reproducibility (the box runs caddy:2-alpine, current 2.x).
      - name: Install Caddy (deploy access-log masking pins)
        run: |
          CADDY_VERSION=2.8.4
          curl -fsSL -o /tmp/caddy.tar.gz \
            "https://github.com/caddyserver/caddy/releases/download/v${CADDY_VERSION}/caddy_${CADDY_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/caddy.tar.gz -C /tmp caddy
          sudo install /tmp/caddy /usr/local/bin/caddy
          caddy version

      # Lint gateway/ with the SAME ruff pin + config the engine lane uses (build-products.yml:48-49):
      # ruff==0.15.17 with engine/pyproject.toml's [tool.ruff] select/ignore set. The gateway ships no
      # own ruff config, so the engine's project-wide config is the single source of the lint policy.
      - name: Lint (ruff)
        run: |
          python -m pip install ruff==0.15.17
          python -m ruff check --config engine/pyproject.toml gateway/

      # From the REPO ROOT (not gateway/) so `import gateway...` resolves as a package, exactly as
      # the command that passed locally. -rs surfaces every skip reason in the log.
      #
      # C35b/D5: pipe the report through the skip tripwire with the gateway lane's OWN allow-list
      # (--allow REPLACES the engine built-in). After C35b/D3 the validator oracles run via the vendored
      # copy (no longer sibling-gated skips), so the ONLY legitimate skip in this stack-less gateway env
      # is the mt_metadata-needing engine-preview oracle (test_runner.py's real-engine e2e). tee keeps the
      # full pytest output in the human log AND feeds the tripwire; `set -o pipefail` so a pytest FAILURE
      # (not just a skip regression) still reds the lane through the pipe. Any OTHER skip — e.g. a
      # validator oracle regressing to skip, the exact F7 hole — fails the lane loudly.
      # deploy/tests rides this lane too (C40): the reconcile.sh decision-logic tests are plain
      # pytest + sh + git, all present on the runner — including flock(1), so the lock-held case that
      # skips on a Windows dev box RUNS here (no new allow-list entry; a skip would trip the wire).
      - name: Gateway unit tests (+ loud skip accounting)
        run: |
          set -o pipefail
          python -m pytest -q -rs gateway/tests deploy/tests | tee gateway-pytest.out
          python engine/tests/ci_check_skips.py \
            --allow "real engine stack / sample survey / validator not present" < gateway-pytest.out
