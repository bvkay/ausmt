version: 2

# RTD reads this file from the REPO ROOT. Since the ADR-001 monorepo merge the documentation lives
# under docs/, so the mkdocs config + requirements paths below are repo-root-relative into docs/.
#
# RTD schema v2 REQUIRES an explicit build environment (os + tool versions). Without this block the
# build fails validation before it ever reads mkdocs.yml.
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

mkdocs:
  configuration: docs/mkdocs.yml

python:
  install:
    - requirements: docs/requirements.txt
